<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google-site-verification" content="sVkOacl4R5yo8MT-ITUa92ddPe2GgW3rn_DHofKhATc" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="FormulaSphere – 200+ math formulas across 14 categories. Installable PWA.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FormulaSphere">
  <meta name="application-name" content="FormulaSphere">
  <meta name="msapplication-TileColor" content="#3b82f6">
  <title>FormulaSphere – Math Formula Reference</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/jpeg" href="logo.jpg">
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">
      <img src="logo.jpg" alt="FormulaSphere Logo" class="splash-logo-img">
      <span>Formula</span>Sphere
    </div>
    <div class="splash-loader">
      <div class="splash-progress"></div>
    </div>
  </div>
  <script>
    (function() {
      var splashDismissed = false;
      function dismissSplash() {
        if (splashDismissed) return;
        splashDismissed = true;
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.transform = 'scale(1.06)';
          splash.style.pointerEvents = 'none';
          setTimeout(function() {
            splash.remove();
          }, 450);
        }
      }
      window.addEventListener('load', function() {
        setTimeout(dismissSplash, 1200); // Premium visual load time
      });
      // Fallback
      setTimeout(dismissSplash, 3000);
    })();
  </script>

  <header id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()" title="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    
    <div class="logo" onclick="goToDashboard()" title="Dashboard">
      <img src="logo.jpg" alt="FormulaSphere Logo" class="logo-img">
      <span>Formula</span>Sphere
    </div>

    <!-- Mobile search trigger button -->
    <button id="search-trigger-btn" onclick="openMobileSearch()" title="Open search">
      <span class="search-trigger-icon">&#x2315;</span>
    </button>

    <div id="search-wrap">
      <span class="search-icon">&#x2315;</span>
      <input id="search" type="text" placeholder="Search formulas&hellip;" oninput="handleSearch(this.value)"
        autocomplete="off" maxlength="100">
      <button id="search-clear-btn" onclick="clearSearchInput(event)" title="Clear search" style="display:none;">&times;</button>
    </div>
    
    <!-- Cancel button for exiting mobile search -->
    <button id="search-close-btn" onclick="closeMobileSearch()" title="Cancel search">Cancel</button>

    <div class="top-stats">
      <span class="stat"><b id="total-count">0</b> formulas</span>
      <span class="stat"><b>14</b> topics</span>
    </div>

    <!-- PWA Install button (functional) -->
    <button id="install-btn" title="Install FormulaSphere" onclick="handleInstallClick()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M5 7l3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span class="install-label" id="install-label">Install App</span>
    </button>
  </header>

  <div id="overlay" onclick="toggleSidebar()"></div>

  <nav id="sidebar">
    <div class="sb-head">Navigation</div>
    <div class="sb-home active" id="sb-home-btn" onclick="goToDashboard()">
      <span style="font-size:15px">&#8962;</span> Dashboard
    </div>
    <div class="sb-separator"></div>
    <div class="sb-head">Topics &amp; Subtopics</div>
    <div id="sb-list"></div>
  </nav>

  <main id="main">
    <div id="content"></div>
  </main>

  <div id="toast"></div>

  <!-- ─────────────────────────────────────────
     DOWNLOAD APP MODAL
     ───────────────────────────────────────── -->
  <div id="install-modal-backdrop" onclick="closeInstallModal()"></div>
  <div id="install-modal" class="modal-card" role="dialog" aria-modal="true" aria-label="Download Guide">
    <div class="modal-head">
      <div class="modal-title">
        <span class="modal-title-icon">&#x1F4E5;</span> Download FormulaSphere
      </div>
      <button class="modal-close" onclick="closeInstallModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="dl-section">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <img src="logo.jpg" alt="FormulaSphere Logo" style="width:44px;height:44px;border-radius:50%;border:1px solid rgba(59,130,246,0.3);object-fit:cover;background:var(--card);">
          <div>
            <div class="dl-label">Android Package</div>
            <div class="dl-title">Download APK File</div>
          </div>
        </div>
        <div class="dl-desc">Prefer a native Android app? Download the signed offline APK.</div>
        <a href="./FormulaSphere.apk" download="FormulaSphere.apk">
          <button class="dl-btn green-btn">Download APK (5.1 MB)</button>
        </a>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-ok" onclick="closeInstallModal()">Close</button>
    </div>
  </div>

  <footer>
    <div class="footer-content">
      <div class="footer-left" style="display:flex;align-items:center;gap:6px;">
        <img src="logo.jpg" alt="" class="footer-logo-img"> FormulaSphere &copy; 2026
      </div>
      <div class="footer-right">
        Made with &#10084;&#65039; by Piyush.
      </div>
    </div>
  </footer>
  <script src="./script.js"></script>
</body>

</html>
